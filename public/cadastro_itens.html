<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Turmas — Notas Escolares</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="fa-solid fa-graduation-cap me-2"></i>Notas Escolares</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
      <div class="d-flex align-items-center gap-2" id="navbar-links"></div>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="page-header">
    <a href="index.html" class="btn btn-sm btn-outline-light me-2"><i class="fa-solid fa-arrow-left"></i></a>
    <h1><i class="fa-solid fa-chalkboard me-2"></i>Gerenciar Turmas</h1>
    <button class="btn btn-warning btn-sm ms-auto fw-bold" onclick="abrirModalNova()">
      <i class="fa-solid fa-plus me-1"></i>Nova Turma
    </button>
  </div>

  <div class="bg-white rounded-3 shadow-sm p-3">
    <table class="table table-turmas table-hover align-middle mb-0">
      <thead>
        <tr>
          <th>ID</th><th>Nome</th><th>Turno</th><th>Ano</th>
          <th class="text-center">Destaque</th><th>Alunos</th><th class="text-center">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody-turmas"></tbody>
    </table>
  </div>
</div>

<!-- Modal turma -->
<div class="modal fade" id="modalTurma" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--cor-principal);color:#fff">
        <h5 class="modal-title" id="modalTituloTurma">Nova Turma</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">ID da Turma *</label>
            <input type="text" id="t-id" class="form-control" placeholder="Ex: 4A">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Nome *</label>
            <input type="text" id="t-nome" class="form-control" placeholder="Ex: 4º Ano A">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Seção</label>
            <input type="text" id="t-secao" class="form-control" placeholder="A">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Turno *</label>
            <select id="t-turno" class="form-select">
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Ano *</label>
            <select id="t-ano" class="form-select">
              <option value="1">1º Ano</option>
              <option value="2">2º Ano</option>
              <option value="3">3º Ano</option>
            </select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
              <input type="checkbox" id="t-destaque" class="form-check-input">
              <label for="t-destaque" class="form-check-label fw-semibold">Exibir no destaque</label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Descrição *</label>
            <textarea id="t-descricao" class="form-control" rows="3" placeholder="Descreva a turma..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary-ne" onclick="salvarTurma()">
          <i class="fa-solid fa-floppy-disk me-1"></i>Salvar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/dados.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/cadastro_itens.js"></script>
</body>
</html>
