<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes da Turma — Notas Escolares</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="fa-solid fa-graduation-cap me-2"></i>Notas Escolares</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
      <div class="d-flex align-items-center gap-2" id="navbar-links"></div>
    </div>
  </div>
</nav>

<div class="container py-4" id="pagina-detalhes">
  <!-- conteúdo injetado por detalhes.js -->
</div>

<!-- Modal aluno -->
<div class="modal fade" id="modalAluno" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--cor-principal);color:#fff">
        <h5 class="modal-title" id="modalAlunoTitulo">Aluno</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalAlunoBody"></div>
      <div class="modal-footer" id="modalAlunoFooter"></div>
    </div>
  </div>
</div>

<!-- Modal editar/adicionar aluno (admin) -->
<div class="modal fade" id="modalFormAluno" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--cor-principal);color:#fff">
        <h5 class="modal-title" id="formAlunoTitulo">Aluno</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Nome (abreviado)</label>
            <input type="text" id="a-nome" class="form-control" placeholder="Ex: Carlos">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Nome Completo *</label>
            <input type="text" id="a-nomeCompleto" class="form-control" placeholder="Carlos Eduardo da Silva">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">CPF</label>
            <input type="text" id="a-cpf" class="form-control" placeholder="000.000.000-00">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Matrícula</label>
            <input type="text" id="a-matricula" class="form-control" placeholder="12345678">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="text" id="a-email" class="form-control" placeholder="aluno@email.com">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Gênero</label>
            <select id="a-genero" class="form-select">
              <option value="Masculino">Masculino</option>
              <option value="Feminino">Feminino</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Matéria Destaque</label>
            <input type="text" id="a-destaque" class="form-control" placeholder="Matemática">
          </div>
        </div>
        <hr class="my-3">
        <h6 class="fw-bold" style="color:var(--cor-principal)">Notas</h6>
        <div class="notas-grid">
          <div><label class="form-label">Matemática</label><input type="number" id="a-matematica" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Língua Portuguesa</label><input type="number" id="a-portugues" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">História</label><input type="number" id="a-historia" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Geografia</label><input type="number" id="a-geografia" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Física</label><input type="number" id="a-fisica" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Biologia</label><input type="number" id="a-biologia" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Filosofia</label><input type="number" id="a-filosofia" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Sociologia</label><input type="number" id="a-sociologia" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Inglês</label><input type="number" id="a-ingles" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
          <div><label class="form-label">Redação</label><input type="number" id="a-redacao" class="form-control" min="0" max="10" step="0.1" oninput="recalcMedia()"></div>
        </div>
        <div class="mt-3">
          <label class="form-label fw-bold">Média Geral (calculada)</label>
          <input type="text" id="a-media" class="form-control fw-bold" style="color:var(--cor-principal)" readonly>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary-ne" onclick="salvarAluno()">
          <i class="fa-solid fa-floppy-disk me-1"></i>Salvar
        </button>
      </div>
    </div>
  </div>
</div>

<footer class="text-center py-3 mt-4">
  <p class="mb-0 small opacity-75">&copy; 2026 Notas Escolares Online</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/dados.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/detalhes.js"></script>
</body>
</html>
