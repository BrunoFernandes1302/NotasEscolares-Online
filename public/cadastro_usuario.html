<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário — Notas Escolares</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="fa-solid fa-graduation-cap me-2"></i>Notas Escolares</a>
    <div class="d-flex gap-2" id="navbar-links"></div>
  </div>
</nav>

<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
  <div class="form-card w-100">
    <div class="text-center mb-4">
      <i class="fa-solid fa-user-plus fa-3x" style="color:var(--cor-principal)"></i>
      <h3 class="mt-2">Criar Conta</h3>
    </div>

    <div id="msg-feedback" class="d-none"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Nome completo</label>
      <input type="text" id="nome" class="form-control" placeholder="Seu nome">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Login</label>
      <input type="text" id="login" class="form-control" placeholder="Escolha um login único">
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" id="senha" class="form-control" placeholder="Mínimo 4 caracteres">
    </div>
    <button class="btn btn-primary-ne w-100 py-2" onclick="cadastrar()">
      <i class="fa-solid fa-user-plus me-2"></i>Cadastrar
    </button>

    <p class="text-center mt-3 mb-0">
      Já tem conta? <a href="login.html" style="color:var(--cor-hover)">Entrar</a>
    </p>
  </div>
</main>

<footer class="text-center py-3">
  <p class="mb-0 small opacity-75">&copy; 2026 Notas Escolares Online</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/dados.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/cadastro_usuario.js"></script>
</body>
</html>
